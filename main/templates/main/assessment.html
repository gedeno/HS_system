<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Assessment - Teacher Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/base.css' %}">
</head>
<body>
    <div class="container">
        <h1>Student Assessment</h1>
        <p>Enter assessment details for the selected student.</p>

        <form action="" method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Save Assessment</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'teachers' %}" style="color: #667eea;">← Back to Student List</a>
        </div>
    </div>
</body>
</html>
