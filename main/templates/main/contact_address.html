<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Address - Student Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/base.css' %}">
</head>
<body>
    <div class="container">
        <h1>Contact Address Information</h1>
        <p>Please provide your current contact address details.</p>

        <form action="" method="post">
            {% csrf_token %}
            {{form.as_p}}
            <button type="submit">Save Address</button>
        </form>
    </div>
</body>
</html>
