<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management - Teacher Portal</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/base.css' %}">
</head>
<body>
    <div class="container">
        <h1>Course Management</h1>
        <p>Select a student to add courses for assessment.</p>

        <div style="text-align: center; margin-bottom: 30px;">
            <a href="{% url 'logout' %}" style="display: inline-block; padding: 10px 20px; background: #dc3545; color: white; text-decoration: none; border-radius: 5px;">Logout</a>
        </div>

        <h2>Student List</h2>
        <div class="student-list">
            {% for student in students %}
                <div class="student-card">
                    <a href="{% url 'add_course' student.id %}">{{ student.username }}</a>
                </div>
            {% empty %}
                <p>No students available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
